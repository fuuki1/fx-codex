name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Clone, install, and run full tests
        run: |
          git clone -q --depth 1 --branch "$GITHUB_HEAD_REF" "https://github.com/$GITHUB_REPOSITORY" repo
          cd repo
          python -m pip install -q -r requirements.lock
          python -m pip install -q -e . --no-deps
          python -m pip install -q pytest==9.0.3
          pytest -q --tb=short
