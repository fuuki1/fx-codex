name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          # 品質ゲートの再現性のためツールを固定（未固定だと無関係PRが突然赤くなる）
          python -m pip install ruff==0.15.20 black==26.5.1 mypy==2.1.0
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Mypy
        run: mypy fx_backtester fx_intel *.py
      - name: Tests
        run: pytest
