name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnostic-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Mypy
        run: python -m pip install -q mypy==2.1.0
      - name: Mypy
        run: mypy fx_backtester fx_intel data_platform tools *.py
