name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          # 品質ゲートの再現性のためツールを固定（未固定だと無関係PRが突然赤くなる）
          python -m pip install ruff==0.15.20 black==26.5.1 mypy==2.1.0
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Mypy
        # tools/ をmypy対象に含める（研究v2要件: tools/data_platformを除外しない）
        run: mypy fx_backtester fx_intel data_platform tools *.py
      - name: Conflict markers
        # マージ衝突マーカーの取り込みを防ぐ（git diff --check 相当の意図。既存EOF空行では
        # 落とさず、実害のある衝突マーカーのみを検出）
        run: |
          if git grep -nE '^(<<<<<<< |>>>>>>> |={7}$)' -- '*.py' '*.md' '*.yml' '*.yaml' '*.toml' '*.sh'; then
            echo "::error::merge conflict markers found"; exit 1
          fi
      - name: Tests
        run: pytest
      - name: Safety invariants (fail-closed gates)
        # 昇格・lockbox・改竄・no-live・再現性の不変条件を明示ゲート化（回帰検出）
        run: >
          pytest -q
          tests/test_governance.py
          tests/test_lockbox.py
          tests/test_trial_ledger.py
          tests/test_experiment_pipeline.py

  # trader/（発注スタック）は廃止判断を別PRで行うまで保全する。独自ツールチェーンで
  # 検証する（pyproject の trader 除外設定が参照する trader ジョブ = 以下）。
  # 保全のみであり、自動売買の有効化・Mac mini 配備は行わない。
  trader-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: trader/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          # 品質ゲートの再現性のため mypy を固定（flat 側 CI と同版）
          pip install mypy==2.1.0
      - name: Lint (ruff)
        run: ruff check app tests fx-codex/fx_backtester fx-codex/tests
      - name: Types (mypy) — 稼働スタック app/ を型ゲート
        run: mypy app
      - name: Unit tests (pytest)
        run: pytest
      - name: Validate docker-compose
        run: |
          cp .env.example .env
          docker compose config >/dev/null
          echo "compose config OK"

  trader-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -f trader/app/Dockerfile -t trader-app:ci trader
