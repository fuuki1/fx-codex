name: CI

on:
  push:
    branches: ["main", "integration/research-v3"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          # 品質ゲートの再現性のためツールを固定（未固定だと無関係PRが突然赤くなる）
          python -m pip install ruff==0.15.20 black==26.5.1 mypy==2.1.0
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Mypy
        # tools/ をmypy対象に含める（研究v2要件: tools/data_platformを除外しない）
        run: mypy fx_backtester fx_intel data_platform tools *.py
      - name: Conflict markers
        # マージ衝突マーカーの取り込みを防ぐ（git diff --check 相当の意図。既存EOF空行では
        # 落とさず、実害のある衝突マーカーのみを検出）
        run: |
          if git grep -nE '^(<<<<<<< |>>>>>>> |={7}$)' -- '*.py' '*.md' '*.yml' '*.yaml' '*.toml' '*.sh'; then
            echo "::error::merge conflict markers found"; exit 1
          fi
      - name: Tests
        run: pytest
      - name: Safety invariants (fail-closed gates)
        # 昇格・lockbox・改竄・no-live・再現性の不変条件を明示ゲート化（回帰検出）
        run: >
          pytest -q
          tests/test_governance.py
          tests/test_lockbox.py
          tests/test_trial_ledger.py
          tests/test_experiment_pipeline.py
          tests/test_no_live_execution_surface.py

  required-ci:
    name: required-ci
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Require every matrix job to pass
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::One or more CI matrix jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI quality and safety gates passed."
