name: Format research-v3 hardening

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: format-research-v3-hardening
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install exact formatters
        run: python -m pip install ruff==0.15.20 black==26.5.1
      - name: Apply safe Ruff fixes and Black
        run: |
          ruff check . --fix
          black .
          ruff check .
          black --check .
      - name: Commit only formatter changes
        run: |
          if git diff --quiet; then
            echo "No formatter changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "style: apply pinned Ruff and Black after hardening"
          git push origin HEAD:integration/research-v3
