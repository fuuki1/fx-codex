name: Format research-v3

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: format-research-v3
  cancel-in-progress: true

jobs:
  black:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned Black
        run: python -m pip install black==26.5.1
      - name: Format and commit
        run: |
          black .
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply Black 26.5.1"
          git push origin HEAD:integration/research-v3
