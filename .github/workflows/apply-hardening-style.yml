name: Apply research-v3 hardening style fix

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: apply-research-v3-hardening-style
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply diagnosed narrow fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/data_platform_scorecard.py")
          text = path.read_text()
          target = (
              '    historical = [source for source in bidask '
              'if source.get("collection_mode") == "historical_download"]\n'
          )
          if target not in text:
              raise SystemExit("diagnosed unused-variable target not found")
          path.write_text(text.replace(target, "", 1))
          PY
          python -m pip install ruff==0.15.20 black==26.5.1
          black tools/data_platform_scorecard.py tests/test_collect_daemon_exit_semantics.py
          ruff check .
          black --check .
      - name: Commit diagnosed fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/data_platform_scorecard.py tests/test_collect_daemon_exit_semantics.py
          git commit -m "style: resolve diagnosed hardening lint failures"
          git push origin HEAD:integration/research-v3
