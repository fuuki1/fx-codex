name: Diagnose pytest failures

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: diagnose-pytest-failures
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
      - name: Capture concise failures
        run: |
          mkdir -p reports/ci
          pytest -q --tb=short > reports/ci/hardening-pytest.txt 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ci/hardening-pytest.txt
          git commit -m "chore(ci): capture hardening pytest diagnostics"
          git push origin HEAD:integration/research-v3
