name: Patch five-minute notification tests

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: patch-five-minute-notify-tests
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update launchd and wrapper regression tests
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_ops_lock_and_launchd.py")
          text = path.read_text()
          old = '''@pytest.mark.skipif(_ZSH is None, reason="zshが必要(macOS運用環境向けスクリプト)")
          def test_briefing_wrapper_runs_both_modes_and_propagates_failure(tmp_path):
              root = tmp_path / "repo"
              scripts = root / "scripts"
              python_dir = root / ".venv" / "bin"
              scripts.mkdir(parents=True)
              python_dir.mkdir(parents=True)
              shutil.copy2(_ROOT / "scripts" / "fx_briefing_once.sh", scripts)
              fake_python = python_dir / "python"
              fake_python.write_text(
                  "#!/bin/sh\\n"
                  'root=$(CDPATH= cd -- "$(dirname "$0")/../.." && pwd)\\n'
                  'printf "%s\\\\n" "$*" >> "$root/invocations.txt"\\n'
                  'case "$*" in *--per-timeframe*) exit 0;; *) exit 7;; esac\\n',
                  encoding="utf-8",
              )
              fake_python.chmod(0o755)

              result = subprocess.run(
                  [_ZSH, str(scripts / "fx_briefing_once.sh")],
                  capture_output=True,
                  text=True,
                  timeout=10,
              )

              assert result.returncode == 1
              invocations = (root / "invocations.txt").read_text(encoding="utf-8").splitlines()
              assert len(invocations) == 2
              assert "--per-timeframe" not in invocations[0]
              assert "--per-timeframe" in invocations[1]
          '''
          new = '''@pytest.mark.skipif(_ZSH is None, reason="zshが必要(macOS運用環境向けスクリプト)")
          def test_briefing_wrapper_runs_one_signal_board_and_propagates_failure(tmp_path):
              root = tmp_path / "repo"
              scripts = root / "scripts"
              python_dir = root / ".venv" / "bin"
              scripts.mkdir(parents=True)
              python_dir.mkdir(parents=True)
              shutil.copy2(_ROOT / "scripts" / "fx_briefing_once.sh", scripts)
              fake_python = python_dir / "python"
              fake_python.write_text(
                  "#!/bin/sh\\n"
                  'root=$(CDPATH= cd -- "$(dirname "$0")/../.." && pwd)\\n'
                  'printf "%s\\\\n" "$*" >> "$root/invocations.txt"\\n'
                  "exit 7\\n",
                  encoding="utf-8",
              )
              fake_python.chmod(0o755)

              result = subprocess.run(
                  [_ZSH, str(scripts / "fx_briefing_once.sh")],
                  capture_output=True,
                  text=True,
                  timeout=10,
              )

              assert result.returncode == 7
              invocations = (root / "invocations.txt").read_text(encoding="utf-8").splitlines()
              assert len(invocations) == 1
              invocation = invocations[0]
              assert "--signal-board" in invocation
              assert "--no-price-write" in invocation
              assert "--require-freshness" in invocation
              assert "--per-timeframe" not in invocation
              assert "GBPUSD EURUSD USDJPY" in invocation
          '''
          if old not in text:
              raise SystemExit("legacy briefing wrapper test block not found")
          text = text.replace(old, new, 1)

          marker = '''_ZSH = shutil.which("zsh")  # CI(ubuntu)にはzshが無いためスキップ。macOS実機で検証する
          '''
          schedule_test = '''def test_briefing_plist_runs_on_five_minute_boundaries():
              raw = (_ROOT / "ops" / "launchd" / "com.fx-codex.briefing.plist.tmpl").read_text(
                  encoding="utf-8"
              )
              rendered = raw.replace("__FX_ROOT__", "/Users/example/srv/fx-codex").replace(
                  "__PYTHON__", "/Users/example/srv/fx-codex/.venv/bin/python"
              )
              root = ET.fromstring(rendered)
              dictionary = root.find("dict")
              assert dictionary is not None
              children = list(dictionary)
              schedule_index = next(
                  index
                  for index, node in enumerate(children)
                  if node.tag == "key" and node.text == "StartCalendarInterval"
              )
              schedule = children[schedule_index + 1]
              assert schedule.tag == "array"
              minutes = []
              for entry in schedule.findall("dict"):
                  fields = list(entry)
                  minute_index = next(
                      index
                      for index, node in enumerate(fields)
                      if node.tag == "key" and node.text == "Minute"
                  )
                  minutes.append(int(fields[minute_index + 1].text or "-1"))
              assert minutes == list(range(0, 60, 5))
              keys = [node.text for node in root.iter("key")]
              assert "RunAtLoad" not in keys


          '''
          if marker not in text:
              raise SystemExit("zsh marker not found")
          path.write_text(text.replace(marker, schedule_test + marker, 1))
          PY
      - name: Format and verify
        run: |
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          python -m pip install black==26.5.1 ruff==0.15.20
          black tests/test_ops_lock_and_launchd.py
          ruff check tests/test_ops_lock_and_launchd.py
          pytest -q tests/test_ops_lock_and_launchd.py
      - name: Commit test update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_ops_lock_and_launchd.py
          git commit -m "test(notify): enforce five-minute single Discord schedule"
          git push origin HEAD:integration/research-v3
