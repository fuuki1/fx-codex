name: Patch Discord delivery hardening

on:
  push:
    branches: ["integration/research-v3"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: patch-discord-delivery-hardening
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Add retrying, secret-safe Discord delivery
        run: |
          cat > fx_intel/discord_delivery.py <<'PY'
          """Reliable, secret-safe Discord webhook delivery.

          Notification jobs are periodic and must tolerate transient Discord/network failures
          without leaking the webhook URL into logs.  This module retries only conditions that
          can reasonably recover (rate limits, 5xx, and requests transport errors).
          """

          from __future__ import annotations

          from collections.abc import Callable, Mapping
          import time

          import requests

          DEFAULT_ATTEMPTS = 4
          DEFAULT_TIMEOUT = (10.0, 20.0)
          MAX_RETRY_DELAY_SECONDS = 30.0
          RETRYABLE_STATUS_CODES = frozenset({429, 500, 502, 503, 504})


          class DiscordDeliveryError(RuntimeError):
              """Raised after a webhook delivery cannot be completed safely."""


          def _retry_after_seconds(response: requests.Response, attempt: int) -> float:
              candidates: list[object] = []
              try:
                  payload = response.json()
              except (ValueError, requests.RequestException):
                  payload = None
              if isinstance(payload, Mapping):
                  candidates.append(payload.get("retry_after"))
              candidates.append(response.headers.get("Retry-After"))
              for value in candidates:
                  try:
                      delay = float(value)
                  except (TypeError, ValueError):
                      continue
                  if delay >= 0:
                      return min(delay, MAX_RETRY_DELAY_SECONDS)
              return min(float(2 ** (attempt - 1)), MAX_RETRY_DELAY_SECONDS)


          def send_webhook(
              webhook_url: str,
              payload: Mapping[str, object],
              *,
              attempts: int = DEFAULT_ATTEMPTS,
              timeout: tuple[float, float] = DEFAULT_TIMEOUT,
              sleep_fn: Callable[[float], None] = time.sleep,
          ) -> None:
              """Send one Discord webhook payload with bounded transient retries.

              Error messages intentionally never include the webhook URL or raw requests
              exception text because both can contain the secret URL.
              """
              if attempts < 1:
                  raise ValueError("attempts must be at least 1")
              if not webhook_url.startswith("https://"):
                  raise DiscordDeliveryError("Discord通知設定が不正です（HTTPS URLが必要）")

              last_reason = "unknown"
              for attempt in range(1, attempts + 1):
                  response: requests.Response | None = None
                  try:
                      response = requests.post(
                          webhook_url,
                          json=dict(payload),
                          timeout=timeout,
                      )
                  except requests.RequestException as error:
                      last_reason = f"network error ({type(error).__name__})"
                      if attempt >= attempts:
                          break
                      sleep_fn(min(float(2 ** (attempt - 1)), MAX_RETRY_DELAY_SECONDS))
                      continue

                  try:
                      status = response.status_code
                      if 200 <= status < 300:
                          return
                      last_reason = f"HTTP {status}"
                      if status not in RETRYABLE_STATUS_CODES or attempt >= attempts:
                          break
                      delay = _retry_after_seconds(response, attempt)
                  finally:
                      response.close()
                  sleep_fn(delay)

              raise DiscordDeliveryError(
                  f"Discord通知に失敗しました（{last_reason}, attempts={attempts}）"
              )
          PY

          python - <<'PY'
          from pathlib import Path

          path = Path("fx_briefing.py")
          text = path.read_text(encoding="utf-8")
          old_import = """    decision_pipeline,\n    freshness,\n"""
          new_import = """    decision_pipeline,\n    discord_delivery,\n    freshness,\n"""
          if old_import not in text:
              raise SystemExit("fx_briefing import anchor not found")
          text = text.replace(old_import, new_import, 1)
          old_function = """def post_to_discord(webhook_url: str, payload: dict) -> None:\n    response = requests.post(webhook_url, json=payload, timeout=15)\n    if response.status_code >= 300:\n        raise RuntimeError(f\"Discord通知に失敗: HTTP {response.status_code} {response.text[:200]}\")\n"""
          new_function = """def post_to_discord(webhook_url: str, payload: dict) -> None:\n    discord_delivery.send_webhook(webhook_url, payload)\n"""
          if old_function not in text:
              raise SystemExit("fx_briefing post_to_discord anchor not found")
          path.write_text(text.replace(old_function, new_function, 1), encoding="utf-8")

          path = Path("tools/data_freshness_monitor.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "fx_tf_snapshot(5分毎)とfx_briefing(毎時:10)が書き続けるジャーナル・スナップショット・",
              "fx_tf_snapshotとfx_briefingが5分ごとに更新するジャーナル・スナップショット・",
              1,
          )
          old_sender = '''def send_discord(webhook_url: str, payload: dict) -> bool:\n    """Discordへ送信。失敗してもFalseを返すだけで例外は伝播させない。"""\n    import requests\n\n    try:\n        response = requests.post(webhook_url, json=payload, timeout=15)\n        return 200 <= response.status_code < 300\n    except Exception as exc:  # noqa: BLE001 - 通知失敗が監視を殺してはいけない\n        print(f"[freshness] Discord送信失敗: {exc}", file=sys.stderr)\n        return False\n'''
          new_sender = '''def send_discord(webhook_url: str, payload: dict) -> bool:\n    """Discordへ再試行付きで送信し、秘密URLをログへ出さない。"""\n    from fx_intel import discord_delivery\n\n    try:\n        discord_delivery.send_webhook(webhook_url, payload)\n        return True\n    except discord_delivery.DiscordDeliveryError as error:\n        print(f"[freshness] {error}", file=sys.stderr)\n        return False\n'''
          if old_sender not in text:
              raise SystemExit("freshness send_discord anchor not found")
          path.write_text(text.replace(old_sender, new_sender, 1), encoding="utf-8")
          PY

          cat > tests/test_discord_delivery.py <<'PY'
          from __future__ import annotations

          from dataclasses import dataclass, field

          import requests

          from fx_intel import discord_delivery


          @dataclass
          class FakeResponse:
              status_code: int
              json_payload: object = None
              headers: dict[str, str] = field(default_factory=dict)
              closed: bool = False

              def json(self) -> object:
                  if isinstance(self.json_payload, Exception):
                      raise self.json_payload
                  return self.json_payload

              def close(self) -> None:
                  self.closed = True


          def test_success_closes_response(monkeypatch):
              response = FakeResponse(204)
              monkeypatch.setattr(discord_delivery.requests, "post", lambda *args, **kwargs: response)
              discord_delivery.send_webhook("https://discord.com/api/webhooks/redacted", {"content": "ok"})
              assert response.closed is True


          def test_retries_500_then_succeeds(monkeypatch):
              responses = [FakeResponse(500), FakeResponse(204)]
              sleeps: list[float] = []

              def fake_post(*args, **kwargs):
                  return responses.pop(0)

              monkeypatch.setattr(discord_delivery.requests, "post", fake_post)
              discord_delivery.send_webhook(
                  "https://discord.com/api/webhooks/redacted",
                  {"content": "ok"},
                  sleep_fn=sleeps.append,
              )
              assert sleeps == [1.0]


          def test_uses_discord_retry_after(monkeypatch):
              responses = [FakeResponse(429, {"retry_after": 2.5}), FakeResponse(204)]
              sleeps: list[float] = []
              monkeypatch.setattr(
                  discord_delivery.requests,
                  "post",
                  lambda *args, **kwargs: responses.pop(0),
              )
              discord_delivery.send_webhook(
                  "https://discord.com/api/webhooks/redacted",
                  {"content": "ok"},
                  sleep_fn=sleeps.append,
              )
              assert sleeps == [2.5]


          def test_network_failure_does_not_leak_webhook(monkeypatch):
              secret_url = "https://discord.com/api/webhooks/secret-token"

              def fail(*args, **kwargs):
                  raise requests.exceptions.SSLError(f"failed for {secret_url}")

              monkeypatch.setattr(discord_delivery.requests, "post", fail)
              try:
                  discord_delivery.send_webhook(
                      secret_url,
                      {"content": "x"},
                      attempts=2,
                      sleep_fn=lambda _seconds: None,
                  )
              except discord_delivery.DiscordDeliveryError as error:
                  message = str(error)
              else:
                  raise AssertionError("delivery must fail")
              assert secret_url not in message
              assert "secret-token" not in message
              assert "SSLError" in message
          PY

      - name: Install and verify
        run: |
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          python -m pip install black==26.5.1 ruff==0.15.20 mypy
          black fx_intel/discord_delivery.py fx_briefing.py tools/data_freshness_monitor.py tests/test_discord_delivery.py
          ruff check fx_intel/discord_delivery.py fx_briefing.py tools/data_freshness_monitor.py tests/test_discord_delivery.py
          mypy fx_intel/discord_delivery.py fx_briefing.py tools/data_freshness_monitor.py
          pytest -q tests/test_discord_delivery.py tests/test_ops_freshness.py tests/test_fx_briefing_local_capture.py tests/test_fx_briefing_per_timeframe.py
      - name: Commit hardened delivery and remove one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch_discord_delivery.yml
          git add fx_intel/discord_delivery.py fx_briefing.py tools/data_freshness_monitor.py tests/test_discord_delivery.py
          git commit -m "fix(discord): retry transient failures without leaking webhook"
          git push origin HEAD:integration/research-v3
