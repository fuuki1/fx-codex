name: Update scorecard test fixture

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: update-scorecard-fixture
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update fixture to current evidence contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_data_platform_scorecard.py")
          text = path.read_text()
          old = '''                {
                              "raw_hash_verified": True,
                              "replay_ok": True,
                              "critical_incidents": 0,
                              "primary_up": True,
                              "secondary_up": True,
                          }
          '''
          new = '''                {
                              "schema_version": 1,
                              "report_date": f"2026-08-{day:02d}",
                              "prospective_window_ok": True,
                              "qualifying_day": True,
                              "raw_hash_verified": True,
                              "replay_ok": True,
                              "critical_incidents": 0,
                              "primary_up": True,
                              "secondary_up": True,
                          }
          '''
          if old not in text:
              raise SystemExit("legacy scorecard fixture block not found")
          path.write_text(text.replace(old, new, 1))
          PY
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          python -m pip install black==26.5.1 ruff==0.15.20
          black tests/test_data_platform_scorecard.py
          ruff check tests/test_data_platform_scorecard.py tests/test_data_platform_scorecard_operations_hardening.py
          pytest -q tests/test_data_platform_scorecard.py tests/test_data_platform_scorecard_operations_hardening.py
      - name: Commit fixture update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_data_platform_scorecard.py
          git commit -m "test(data): align scorecard fixtures with prospective contract"
          git push origin HEAD:integration/research-v3
