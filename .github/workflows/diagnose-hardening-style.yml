name: Diagnose research-v3 hardening style

on:
  push:
    branches: ["integration/research-v3"]

permissions:
  contents: write

concurrency:
  group: diagnose-research-v3-hardening
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture complete diagnostics
        run: |
          python -m pip install ruff==0.15.20 black==26.5.1
          mkdir -p reports/ci
          ruff check . --output-format=concise > reports/ci/hardening-ruff.txt 2>&1 || true
          black --check . --diff > reports/ci/hardening-black.txt 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ci/hardening-ruff.txt reports/ci/hardening-black.txt
          git commit -m "chore(ci): capture hardening style diagnostics"
          git push origin HEAD:integration/research-v3
